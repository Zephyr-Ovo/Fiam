; Limen — Fiet's physical perception anchor
; XIAO ESP32S3 Sense + Round Display for XIAO
; PlatformIO project config

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

; Camera + PSRAM
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Round Display GC9A01 via SPI
    -DBOARD_SCREEN_COMBO=501
    ; Disable Sense onboard SD CS to avoid SPI conflict
    -DSENSE_SD_CS=21

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    ; Round Display driver
    https://github.com/Seeed-Studio/Seeed_Arduino_RoundDisplay.git
    ; Graphics library (TFT_eSPI fork)
    https://github.com/Seeed-Studio/Seeed_GFX.git
    ; RTC on Round Display
    mbed-seeed/I2C BM8563 RTC@^1.0.4
    ; HTTP client (built-in ESP32)
    ; Camera (built-in ESP32-S3)
    ; ArduinoJson for API responses
    bblanchon/ArduinoJson@^7.0.0
