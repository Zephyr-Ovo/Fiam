name: Favilla Android APK

on:
  workflow_dispatch:
    inputs:
      api_base:
        description: "VITE_API_BASE (e.g. https://fiet.cc). Leave empty to use repo secret."
        required: false
        default: ""
      mapbox_token:
        description: "VITE_MAPBOX_TOKEN public pk token. Leave empty to use repo secret/variable."
        required: false
        default: ""
      dev_server_url:
        description: "Dev mode: point app at a remote Vite dev server, e.g. http://192.168.70.145:5173. Leave empty for normal prod APK that loads bundled dist."
        required: false
        default: ""
  push:
    branches: [main, feat/memory-graph]
    paths:
      - "channels/favilla/app/**"
      - "packages/stroll-map/**"
      - ".github/workflows/favilla-android.yml"

defaults:
  run:
    working-directory: channels/favilla/app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: channels/favilla/app/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install JS deps
        run: npm ci

      - name: Build web (Vite)
        env:
          VITE_API_BASE: ${{ github.event.inputs.api_base != '' && github.event.inputs.api_base || secrets.VITE_API_BASE }}
          VITE_INGEST_TOKEN: ${{ secrets.VITE_INGEST_TOKEN }}
          VITE_MAPBOX_TOKEN: ${{ github.event.inputs.mapbox_token != '' && github.event.inputs.mapbox_token || secrets.VITE_MAPBOX_TOKEN || vars.VITE_MAPBOX_TOKEN }}
        run: npm run build

      - name: Capacitor sync (android)
        env:
          CAP_DEV_URL: ${{ github.event.inputs.dev_server_url }}
        run: npx cap sync android

      - name: Gradle build (debug APK)
        working-directory: channels/favilla/app/android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: favilla-debug-apk
          path: channels/favilla/app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Push APK to fiet.cc (phone-direct download, no PC/adb needed)
        if: success()
        env:
          INGEST_TOKEN: ${{ secrets.VITE_INGEST_TOKEN }}
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          curl -fsS --max-time 120 \
            -H "X-Fiam-Token: ${INGEST_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"${APK}" \
            http://fiet.cc/favilla/apk \
            && echo "APK pushed to http://fiet.cc/favilla/apk"
