name: favilla-android

on:
  push:
    paths:
      - 'channels/favilla/**'
      - '.github/workflows/favilla-android.yml'
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: channels/favilla

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Cache Android debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: favilla-debug-keystore-v1

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/favilla-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: favilla-debug-apk
          path: channels/favilla/out/favilla-debug.apk
          if-no-files-found: error
          retention-days: 30
