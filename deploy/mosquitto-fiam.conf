# Mosquitto config for fiam — local-only, anonymous, persistent.
#
# Deploy on ISP:  sudo cp deploy/mosquitto-fiam.conf /etc/mosquitto/conf.d/fiam.conf
#                 sudo systemctl restart mosquitto
#
# Verify:         mosquitto_sub -h 127.0.0.1 -t 'fiam/#' -v
#                 mosquitto_pub -h 127.0.0.1 -t 'fiam/receive/test' -m '{"text":"hi"}'

# Bind loopback only — no external exposure.
listener 1883 127.0.0.1
allow_anonymous true

# Persistence: queues QoS 1 messages while subscribers (daemon) are offline,
# survives broker restart.
persistence true
persistence_location /var/lib/mosquitto/
autosave_interval 60

# Reasonable limits — fiam traffic is tiny.
max_queued_messages 1000
message_size_limit 65536
max_inflight_messages 20

# Logging.
log_dest syslog
log_type warning
log_type error
log_type notice
