id = "app"
name = "Self app / web client"
enabled = false
status = "planned_primary"
kind = "client"
description = "Primary future phone/web route replacing most Telegram and Favilla usage."
transports = ["http", "websocket", "mqtt_bridge"]
capabilities = ["chat", "capture_text", "push_notification", "manual_annotation"]
receive_sources = ["app", "webapp"]
dispatch_targets = ["app", "webapp"]
entrypoint = "dashboard"
auth = "Tailscale for private use; Cloudflare Access or device token for public use"
latency = "HTTP/WebSocket is usually sub-second; mobile push delivery depends on platform"
env = []
replaces = ["tg", "favilla"]
notes = [
  "Web/PWA first; package native only when OS capabilities are required."
]