id = "mcp"
name = "MCP bridge"
enabled = false
status = "as_needed"
kind = "tool_bridge"
description = "Adapter for AI clients that can actively call tools/resources through Model Context Protocol."
transports = ["mcp", "stdio_or_http"]
capabilities = ["active_memory_lookup", "tool_call", "resource_read"]
receive_sources = ["mcp"]
dispatch_targets = ["mcp"]
entrypoint = ""
auth = "Client-local MCP config; expose only read/controlled tools"
latency = "tool-call latency; usually sub-second locally, network dependent remotely"
env = []
replaces = []
notes = [
  "MCP does not push hidden context into Claude app; it is mainly AI-active lookup or command execution.",
  "Use it as a bridge when a needed capability already exists as MCP."
]